# --- Cache zone for Next.js static assets ---
proxy_cache_path /var/cache/nginx/serafima levels=1:2 keys_zone=serafima_cache:10m
                 max_size=1g inactive=30d use_temp_path=off;

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name serafima-liberman.com www.serafima-liberman.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://www.serafima-liberman.com$request_uri;
    }
}

# --- Apex -> www redirect (HTTPS) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name serafima-liberman.com;

    ssl_certificate     /etc/letsencrypt/live/serafima-liberman.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serafima-liberman.com/privkey.pem;

    return 301 https://www.serafima-liberman.com$request_uri;
}

# --- Main site ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.serafima-liberman.com;

    ssl_certificate     /etc/letsencrypt/live/serafima-liberman.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serafima-liberman.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Performance
    client_max_body_size 25m;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/xml image/svg+xml text/css text/plain text/xml;

    # --- Static assets: cache aggressively at edge ---
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_cache serafima_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/media/.*\.(jpg|jpeg|png|gif|webp|avif|mp4|mp3|svg|ico|woff2?)$ {
        proxy_pass http://web:3000;
        proxy_cache serafima_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- App ---
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 60s;
    }
}
